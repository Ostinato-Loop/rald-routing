name = "rald-routing"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# Secrets (set via wrangler secret put or GitHub Actions):
#   RALD_JWT_SECRET            — HMAC-SHA256 key (shared with rald-auth-core)
#   SUPABASE_URL               — https://onxdcikfttdmnhofsuwo.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — Supabase service role key (consent checks)

[[routes]]
pattern = "routing.rald.cloud/*"
zone_name = "rald.cloud"
