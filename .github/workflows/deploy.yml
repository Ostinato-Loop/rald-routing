name: Deploy rald-routing

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Workers (routing.rald.cloud)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Push Worker secrets
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN:      ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:     ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RALD_JWT_SECRET:           ${{ secrets.RALD_JWT_SECRET }}
        run: |
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] && echo "$SUPABASE_SERVICE_ROLE_KEY" | npx wrangler secret put SUPABASE_SERVICE_ROLE_KEY && echo "SUPABASE_SERVICE_ROLE_KEY ✓" || echo "WARN: not set"
          [ -n "$RALD_JWT_SECRET" ]           && echo "$RALD_JWT_SECRET"           | npx wrangler secret put RALD_JWT_SECRET           && echo "RALD_JWT_SECRET ✓"           || echo "WARN: not set"

      - name: Audit log
        if: always()
        run: echo "AUDIT service=rald-routing commit=${{ github.sha }} actor=${{ github.actor }} ts=$(date -u +%Y-%m-%dT%H:%M:%SZ) status=${{ job.status }}"
